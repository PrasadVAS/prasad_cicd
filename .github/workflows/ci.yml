name: ML CI Pipeline

on:
  push:
    branches: [main]

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install libraries
      run: pip install -r requirements.txt

    - name: Run training
      run: python train.py

    - name: Register model
      run: python register_model.py
   
